name: Build CLI Image (Webpack, No MITM Stub)

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to GHCR after build'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/tony0410/omniroute

jobs:
  build:
    name: Build CLI + Webpack (No Stub)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=cli-webpack-latest
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=omniroute-cli-webpack
            org.opencontainers.image.description=OmniRoute CLI with real MITM module (webpack build)
            org.opencontainers.image.source=https://github.com/Tony0410/OmniRoute

      - name: Build and push CLI image (webpack = real MITM)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runner-cli
          platforms: linux/amd64
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OMNIROUTE_USE_TURBOPACK=0
          no-cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
